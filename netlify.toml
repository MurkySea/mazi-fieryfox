[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Map /api/* → Netlify Functions so the frontend fetch calls need no changes
[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200

[[redirects]]
  from = "/api/image"
  to = "/.netlify/functions/image"
  status = 200

[[redirects]]
  from = "/api/scene"
  to = "/.netlify/functions/scene"
  status = 200

[[redirects]]
  from = "/api/dialogue"
  to = "/.netlify/functions/dialogue"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
